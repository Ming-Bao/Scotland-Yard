        // ── Helpers ───────────────────────────────────────────────────────────────

        function cleanCoords(lngLats) {
            const out = [lngLats[0]];
            for (let i = 1; i < lngLats.length; i++) {
                const p = out[out.length - 1], c = lngLats[i];
                if (Math.abs(c[0] - p[0]) > 1e-7 || Math.abs(c[1] - p[1]) > 1e-7) out.push(c);
            }
            return out.length >= 2 ? out : lngLats.slice(0, 2);
        }

        function normalizePath(lngLats) {
            if (lngLats.length < 2) return lngLats;
            const dLat = lngLats[lngLats.length - 1][1] - lngLats[0][1];
            const dLng = lngLats[lngLats.length - 1][0] - lngLats[0][0];
            const shouldReverse = dLat < -1e-6 || (Math.abs(dLat) <= 1e-6 && dLng < 0);
            return shouldReverse ? [...lngLats].reverse() : lngLats;
        }

        // SVG pie-chart icon — handles 1, 2 or 3 modes.
        function svgPieIcon(modes, size) {
            const r = size / 2 - 1;
            const cx = size / 2, cy = size / 2;
            const n = modes.length;
            let inner = '';

            if (n === 1) {
                inner = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${COLORS[modes[0]]}"/>`;
            } else {
                for (let i = 0; i < n; i++) {
                    const a1 = (i / n) * 2 * Math.PI - Math.PI / 2;
                    const a2 = ((i + 1) / n) * 2 * Math.PI - Math.PI / 2;
                    const x1 = (cx + r * Math.cos(a1)).toFixed(3);
                    const y1 = (cy + r * Math.sin(a1)).toFixed(3);
                    const x2 = (cx + r * Math.cos(a2)).toFixed(3);
                    const y2 = (cy + r * Math.sin(a2)).toFixed(3);
                    const large = (1 / n) > 0.5 ? 1 : 0;
                    inner += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${COLORS[modes[i]]}"/>`;
                }
            }

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">`
                + inner
                + `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="white" stroke-width="2"/>`
                + `</svg>`;
            return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
        }

        function markerIcon(modes, size) {
            return {
                url: svgPieIcon(modes, size),
                scaledSize: new google.maps.Size(size, size),
                anchor: new google.maps.Point(size / 2, size / 2),
            };
        }

        // ── Highlight state ───────────────────────────────────────────────────────

        const nodeMarkers   = new Map(); // nodeId → { marker, node }
        const edgePolylines = [];        // [{ edge, plines: google.maps.Polyline[] }]
        let activeNodeId = null;

        function applyHighlight(nodeId) {
            const connectedEdges = edgePolylines.filter(({ edge }) => edge.a === nodeId || edge.b === nodeId);
            const connectedIds   = new Set([nodeId]);
            connectedEdges.forEach(({ edge }) => { connectedIds.add(edge.a); connectedIds.add(edge.b); });
            const connectedEdgeSet = new Set(connectedEdges.map(({ edge }) => edge));

            for (const { edge, plines } of edgePolylines) {
                const on = connectedEdgeSet.has(edge);
                plines.forEach(pl => pl.setOptions({ strokeOpacity: on ? 1 : 0.1, strokeWeight: on ? 7 : 3 }));
            }
            for (const [id, { marker, node }] of nodeMarkers) {
                if (id === nodeId) {
                    marker.setIcon(markerIcon(node.modes, 24));
                    marker.setOpacity(1);
                } else if (connectedIds.has(id)) {
                    marker.setIcon(markerIcon(node.modes, 18));
                    marker.setOpacity(1);
                } else {
                    marker.setIcon(markerIcon(node.modes, 14));
                    marker.setOpacity(0.25);
                }
            }
        }

        function resetHighlight() {
            edgePolylines.forEach(({ plines }) =>
                plines.forEach(pl => pl.setOptions({ strokeOpacity: 1, strokeWeight: 5 }))
            );
            nodeMarkers.forEach(({ marker, node }) => {
                marker.setIcon(markerIcon(node.modes, 18));
                marker.setOpacity(1);
            });
            activeNodeId = null;
        }

        // ── initMap (Google Maps callback) ────────────────────────────────────────

        function initMap() {
            const map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: -41.288, lng: 174.777 },
                zoom: 15,
                styles: MAP_STYLE,
                disableDefaultUI: true,
                zoomControl: true,
                gestureHandling: 'greedy',
            });

            map.addListener('click', () => {
                if (activeNodeId !== null) resetHighlight();
            });

            // Render edges
            for (const edge of EDGES) {
                const lngLats = normalizePath(cleanCoords(edge.route));
                const line    = turf.lineString(lngLats);
                const entry   = { edge, plines: [] };

                for (const mode of edge.modes) {
                    const offsetM = MODE_OFFSET_M[mode];
                    let geom = line;
                    if (offsetM !== 0) {
                        try {
                            const off = turf.lineOffset(line, offsetM, { units: 'meters' });
                            const cs  = off?.geometry?.coordinates;
                            if (cs?.length >= 2 && cs.every(([x, y]) => isFinite(x) && isFinite(y))) geom = off;
                        } catch (e) { /* fall back to centreline */ }
                    }
                    const path = geom.geometry.coordinates.map(([lng, lat]) => ({ lat, lng }));
                    const pl = new google.maps.Polyline({
                        path,
                        map,
                        strokeColor:   COLORS[mode],
                        strokeWeight:  5,
                        strokeOpacity: 1,
                    });
                    entry.plines.push(pl);
                }
                edgePolylines.push(entry);
            }

            // Render nodes
            for (const node of NODES) {
                const marker = new google.maps.Marker({
                    position: { lat: node.lat, lng: node.lng },
                    map,
                    icon:  markerIcon(node.modes, 18),
                    title: node.label,
                    zIndex: 10,
                });
                marker.addListener('click', () => {
                    if (activeNodeId === node.id) { resetHighlight(); return; }
                    activeNodeId = node.id;
                    applyHighlight(node.id);
                });
                nodeMarkers.set(node.id, { marker, node });
            }
        }
    </script>

    <script>
        fetch('env')
            .then(r => r.text())
            .then(text => {
                const env = {};
                text.split('\n').forEach(line => {
                    line = line.trim();
                    if (line && !line.startsWith('#') && line.includes('=')) {
                        const [k, ...v] = line.split('=');
                        env[k.trim()] = v.join('=').trim();
                    }
                });
                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=${env['GOOGLE_MAPS_API_KEY'] ?? ''}&callback=initMap`;
                script.async = true;
                script.defer = true;
                document.head.appendChild(script);
            });
    </script>
</body>
</html>
